# POSIX线程示例配置

# 启用POSIX适配层
CONFIG_POSIX_ADAPTER=y

# 线程配置
CONFIG_PTHREAD_DYNAMIC_STACK=y
CONFIG_PTHREAD_DEFAULT_STACK_SIZE=2048
CONFIG_PTHREAD_MAX_THREADS=8

# 内存配置
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=2048

# 日志配置
CONFIG_LOG=y
CONFIG_PTHREAD_LOG_LEVEL_DBG=y

# 控制台
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
