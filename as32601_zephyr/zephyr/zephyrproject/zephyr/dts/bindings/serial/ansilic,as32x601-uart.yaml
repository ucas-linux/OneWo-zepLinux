description: Ansilic AS32X601 UART/USART controller

compatible: "ansilic,as32x601-uart"

include: [uart-controller.yaml, pinctrl-device.yaml, base.yaml]

properties:
  reg:
    required: true
  current-speed:
    type: int
    required: true
  interrupts:
    required: true
  interrupt-parent:
    required: true
  clock-frequency:
    type: int
