# LMZ Hello World Example Configuration

# Enable MPU for process isolation
CONFIG_MPU=y
CONFIG_THREAD_STACK_MEM_MPU=y

# Enable memory management
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MALLOC_ARENA_SIZE=16384

# Enable POSIX threads
CONFIG_PTHREAD_IPC=y
CONFIG_PTHREAD_MUTEX=y
CONFIG_PTHREAD_COND=y

# Enable system calls
CONFIG_USERSPACE=y

# Stack sizes
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_PRIORITY=7

# Logging
CONFIG_LOG=y
