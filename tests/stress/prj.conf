# LMZ Stress Tests Configuration

# Enable testing
CONFIG_ZTEST=y

# Enable MPU for testing
CONFIG_MPU=y
CONFIG_THREAD_STACK_MEM_MPU=y

# Enable memory management (larger for stress)
CONFIG_HEAP_MEM_POOL_SIZE=131072
CONFIG_MALLOC_ARENA_SIZE=65536

# Enable POSIX threads
CONFIG_PTHREAD_IPC=y
CONFIG_PTHREAD_MUTEX=y
CONFIG_PTHREAD_COND=y
CONFIG_PTHREAD_MUTEX_PRIORITY_INHERIT=y

# Enable system calls
CONFIG_USERSPACE=y

# Stack sizes
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_PRIORITY=7

# Logging
CONFIG_LOG=y
